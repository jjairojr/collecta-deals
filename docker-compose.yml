services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=warning
      - TZ=America/Sao_Paulo
    mem_limit: 1g
    restart: unless-stopped

  opdeals:
    build: .
    container_name: opdeals
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=America/Sao_Paulo
    command: ["-web=web/dist", "-schedule", "-flaresolverr", "http://flaresolverr:8191"]
    depends_on:
      - flaresolverr
    restart: unless-stopped
